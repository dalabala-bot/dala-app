<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Білім Mini App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <!-- Сол жақ бөлім - Иллюстрация -->
  <div class="left-section">
    <div class="illustration">
      <img src="../img/education.svg" alt="Білім">
    </div>
    <h1>Білім әлеміне<br>қош келдіңіз!</h1>
    <p>Викториналар, тесттер және қызықты тапсырмалар</p>
  </div>

  <!-- Оң жақ бөлім - Авторизация -->
  <div class="right-section">
    <div class="auth-container">
      <div class="tabs">
        <button class="tab active" id="emailTab">Почта</button>
        <button class="tab" id="phoneTab">Нөмір</button>
      </div>

      <!-- Почта арқылы кіру формасы -->
      <form id="emailForm" class="auth-form active">
        <div class="input-group">
          <label>Электрондық пошта</label>
          <input type="email" placeholder="example@mail.com" required>
        </div>
        <div class="input-group">
          <label>Құпия сөз</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Кіру</button>
        <a href="#" class="forgot-link">Құпия сөзді ұмыттыңыз ба?</a>
      </form>

      <!-- Телефон арқылы кіру формасы -->
      <form id="phoneForm" class="auth-form">
        <div class="input-group">
          <label>Телефон нөмірі</label>
          <input type="tel" placeholder="+7 (700) 123-45-67" required>
        </div>
        <div class="input-group">
          <label>Құпия сөз</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Кіру</button>
        <a href="#" class="forgot-link">Құпия сөзді ұмыттыңыз ба?</a>
      </form>

      <div class="register-link">
        <p>Аккаунт жоқ па? <a href="#">Тіркелу</a></p>
      </div>

      <button class="btn-secondary">Сатып алуға өту</button>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
